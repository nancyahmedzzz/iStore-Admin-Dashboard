<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات النظام | iStore متجر التفاحة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'], en: ['Plus Jakarta Sans', 'sans-serif'] } } } };
    </script>
    <style> body { font-family: 'Cairo', sans-serif !important; } .font-en { font-family: 'Plus Jakarta Sans', sans-serif !important; } </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex h-screen w-full antialiased selection:bg-emerald-300 dark:selection:bg-emerald-700 bg-[var(--bg-main)] transition-colors overflow-hidden">
    
    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-[var(--bg-surface)]/80 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300 md:hidden"></div>

    <aside id="sidebar" class="w-64 h-full glass-panel border-l border-[var(--border-color)] flex flex-col z-50 flex-shrink-0 transition-transform duration-300 fixed inset-y-0 right-0 translate-x-full md:relative md:translate-x-0 bg-[var(--bg-main)]">
        <div class="h-20 flex items-center px-6 border-b border-[var(--border-color)] stagger-1">
            <div class="w-10 h-10 bg-[var(--text-primary)] rounded-xl flex items-center justify-center shadow-lg anim-pulse-ring">
                <i data-lucide="apple" class="w-6 h-6 text-[var(--bg-main)]"></i>
            </div>
            <span class="mr-4 font-bold text-xl tracking-tight text-[var(--text-primary)] font-en">iStore Dashboard</span>
        </div>
        
        <nav class="flex-1 py-8 px-4 overflow-y-auto space-y-2 stagger-2">
            <p class="px-4 text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider mb-2">القائمة الرئيسية</p>
            
            <a href="index.html" class="nav-link flex items-center px-4 py-3 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--hover-bg)] hover:text-[var(--text-primary)] group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="mr-4 text-sm font-semibold">نظرة عامة</span>
            </a>
            <a href="analytics.html" class="nav-link flex items-center px-4 py-3 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--hover-bg)] hover:text-[var(--text-primary)] group">
                <i data-lucide="pie-chart" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="mr-4 text-sm font-semibold">التحليلات المتقدمة</span>
            </a>
            <a href="customers.html" class="nav-link flex items-center px-4 py-3 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--hover-bg)] hover:text-[var(--text-primary)] group">
                <i data-lucide="users" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="mr-4 text-sm font-semibold">العملاء</span>
                <span class="mr-auto bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 py-0.5 px-2 rounded-full text-[10px] font-bold font-en">NEW</span>
            </a>
            <a href="settings.html" class="nav-link active flex items-center px-4 py-3 rounded-xl text-[var(--text-primary)] group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span class="mr-4 text-sm font-semibold">الإعدادات</span>
            </a>
        </nav>

        <div class="p-6 border-t border-[var(--border-color)] stagger-3">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Nancy+Ahmed&background=10b981&color=fff&rounded=true" class="w-10 h-10 rounded-full object-cover border-2 border-[var(--border-color)] group-hover:scale-105 transition-transform" alt="نانسي">
                <div>
                    <h4 class="text-sm font-bold text-[var(--text-primary)]">نانسي أحمد</h4>
                    <p class="text-xs text-[var(--text-secondary)]">المدير العام</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col relative w-full h-full bg-[var(--bg-main)] transition-colors overflow-hidden">
        
        <header class="h-20 glass-panel flex items-center justify-between px-4 md:px-8 z-10 sticky top-0 stagger-1">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden w-10 h-10 rounded-xl flex items-center justify-center bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-primary)] hover:bg-[var(--hover-bg)] transition-all shadow-[var(--shadow-sm)]">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="relative w-96 hidden md:block group">
                <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--text-secondary)] group-hover:text-[var(--accent)] transition-colors"></i>
                <input type="text" placeholder="البحث في الإعدادات..." class="w-full bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-full pr-12 pl-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--accent)] transition-all text-[var(--text-primary)] placeholder-[var(--text-secondary)] shadow-sm focus:shadow-md">
            </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-primary)] hover:bg-[var(--hover-bg)] transition-all hover:-translate-y-1">
                    <div class="pointer-events-none">
                        <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                        <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
                    </div>
                </button>
                <button class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--bg-surface)] border border-[var(--border-color)] text-[var(--text-primary)] hover:bg-[var(--hover-bg)] transition-all relative hover:-translate-y-1">
                    <i data-lucide="bell" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto w-full p-8 relative">
            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-gradient-to-tl from-emerald-500/10 to-transparent dark:from-emerald-500/10 rounded-full blur-[100px] pointer-events-none -z-10 anim-pulse-ring"></div>
            
            <div class="page-content active" style="opacity: 1; animation: none;">
                <div class="max-w-4xl mx-auto stagger-1">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-[var(--text-primary)]">إعدادات الحساب</h1>
                        <p class="text-sm text-[var(--text-secondary)] mt-1 font-medium">إعدادات حساب المدير "نانسي".</p>
                    </div>

                    <div class="premium-card p-8 stagger-2">
                        <div class="flex flex-col md:flex-row gap-8 items-start">
                            <div class="relative group cursor-pointer shrink-0">
                                <img src="https://ui-avatars.com/api/?name=Nancy+Ahmed&background=10b981&color=fff&rounded=true" class="w-24 h-24 rounded-2xl object-cover border-4 border-[var(--bg-main)] shadow-md group-hover:scale-105 transition-transform">
                            </div>
                            <div class="flex-1 w-full space-y-6">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-[var(--text-secondary)]">الاسم الأول</label>
                                        <input type="text" value="نانسي" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--accent)] transition-all text-[var(--text-primary)] font-bold shadow-inner">
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-sm font-bold text-[var(--text-secondary)]">اسم العائلة</label>
                                        <input type="text" value="أحمد" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--accent)] transition-all text-[var(--text-primary)] font-bold shadow-inner">
                                    </div>
                                    <div class="space-y-2 md:col-span-2">
                                        <label class="text-sm font-bold text-[var(--text-secondary)]">البريد الإلكتروني</label>
                                        <input type="email" value="nancy.ahmed@istore.eg" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--accent)] transition-all text-[var(--text-primary)] font-en font-bold shadow-inner" dir="ltr">
                                    </div>
                                </div>
                                <div class="pt-4 flex justify-end">
                                    <button class="bg-[var(--text-primary)] text-[var(--bg-main)] px-8 py-3 rounded-xl font-bold text-sm hover:-translate-y-1 transition-transform shadow-[var(--shadow-md)]">حفظ التعديلات</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
